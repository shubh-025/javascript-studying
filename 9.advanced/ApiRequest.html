<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body style="background-color: #212121;">

0	UNSENT	Client has been created. open() not called yet.
1	OPENED	open() has been called.
2	HEADERS_RECEIVED	send() has been called, and headers and status are available.
3	LOADING	Downloading; responseText holds partial data.
4	DONE	The operation is complete.


 <div id="card">
        <h3>Click to see profile</h3>
        <img id="avatar" src="" alt="Profile Photo">
        <p id="followers"></p>
    </div>
</body>
<script>
    // not used nowadays but good to know
   const xhr = new XMLHttpRequest()
   const reqUrl = 'https://api.github.com/users/shubh-025'

   xhr.open('GET',reqUrl)
    // open doesnt get called on its own

    xhr.onreadystatechange = function(){
        console.log(xhr.readyState);
        if(xhr.readyState === 4){
            // const data = this.responseText
            // console.log(typeof data);  // string

            const data = JSON.parse(this.responseText)  //to convert string to object

            console.log(typeof data);  // object
            console.log(data);


                  // Add Click Event to the frame
            const card = document.querySelector('#card');
            card.addEventListener('click', () => {
                // Update the frame with data
                document.querySelector('h3').innerText = data.name || "GitHub User";
                const img = document.querySelector('#avatar');
                img.src = data.avatar_url;
                img.style.display = 'inline-block';
                document.querySelector('#followers').innerText = `Followers: ${data.followers}`;
            })
            
        }
    }
 
    xhr.send()
</script>
</html>
