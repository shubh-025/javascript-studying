<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>chai aur </h1>
    <button id="stop">Stop</button>
</body>
<script>
    const sayShubh = function(){
        console.log('shubh'); // will print shubh in console after every 2s
                             // setTimeout does it once
    }

    const changeText = function (){
        document.querySelector('h1').innerHTML 
     = "best JS series"
    }

    setTimeout(sayShubh , 2000)
    const changeMe = setTimeout(changeText , 2000)

    // clearTimeout(changeMe) it will stop timeout but whats the use of this we want clear timeout on some event

    document.querySelector('#stop').addEventListener('click',function(e){
        clearTimeout(changeMe)
        console.log('stopped');
        
    })
</script>
</html>
